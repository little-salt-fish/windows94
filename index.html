<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Windows 94</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect x='1' y='1' width='6' height='6' fill='%23FF0000'/><rect x='9' y='1' width='6' height='6' fill='%2300AA00'/><rect x='1' y='9' width='6' height='6' fill='%230000FF'/><rect x='9' y='9' width='6' height='6' fill='%23FFFF00'/></svg>">
  <link rel="stylesheet" href="styles.css">
  <script>
    function scaleCRT() {
      var wrapper = document.getElementById('crt-wrapper');
      if (!wrapper) return;
      var vw = window.visualViewport ? window.visualViewport.width : window.innerWidth;
      var vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      var padding = 8;
      var scaleX = (vw - padding) / 640;
      var scaleY = (vh - padding) / 480;
      var scale = Math.min(scaleX, scaleY, 1);
      wrapper.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
      wrapper.style.top = '50%';
      wrapper.style.left = '50%';
    }
    scaleCRT();
    window.addEventListener('resize', scaleCRT);
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', scaleCRT);
      window.visualViewport.addEventListener('scroll', scaleCRT);
    }
    window.addEventListener('orientationchange', function() {
      setTimeout(scaleCRT, 300);
    });
  </script>
</head>
<body>

  <div id="crt-wrapper">
  <div id="boot-screen" style="background:#000;color:#fff;font-family:'Courier New',monospace;font-size:13px;padding:20px;z-index:99999;line-height:1.7;display:none"></div>

  <div id="splash-screen" style="background:linear-gradient(to bottom,#1a6bb5 0%,#4a9fd4 40%,#87CEEB 70%,#c8e8f5 85%,#e8f4f8 100%);display:none;align-items:center;justify-content:center;z-index:99998">
    <div id="splash-content" style="display:flex;flex-direction:column;align-items:center;gap:14px">
      <div id="splash-flag" style="display:grid;grid-template-columns:28px 28px;grid-template-rows:28px 28px;gap:3px"></div>
      <div id="splash-title" style="color:#fff;font-size:24px;font-weight:bold;opacity:0;text-shadow:1px 1px #000">Windows 94</div>
      <div id="splash-subtitle" style="color:#808080;font-size:12px;font-style:italic;opacity:0">A nostalgic OS from the future</div>
      <div id="splash-progress-wrapper" style="width:300px"></div>
    </div>
  </div>

  <div id="desktop" class="desktop" style="display:none">

    <div id="desktop-icons">
    <div id="icon-mycomputer" class="icon">
      <div class="icon-img" style="position:relative;width:32px;height:32px">
        <div style="position:absolute;top:0;left:2px;width:28px;height:20px;background:#C0C0C0;border:2px solid #000;border-radius:2px">
          <div style="margin:2px;width:22px;height:14px;background:#000080"></div>
        </div>
        <div style="position:absolute;bottom:0;left:8px;width:16px;height:4px;background:#808080;border:1px solid #000"></div>
        <div style="position:absolute;bottom:4px;left:12px;width:8px;height:3px;background:#C0C0C0;border:1px solid #000"></div>
      </div>
      <div class="icon-label" style="text-shadow:-1px 0 #000,0 1px #000,1px 0 #000,0 -1px #000">My Computer</div>
    </div>

    <div id="icon-mydocs" class="icon">
      <div class="icon-img" style="position:relative;width:32px;height:32px">
        <div style="position:absolute;top:2px;left:2px;width:24px;height:28px;background:#FFD700;border:2px solid #B8860B;border-radius:1px">
          <div style="position:absolute;top:-6px;left:0;width:12px;height:6px;background:#FFD700;border:2px solid #B8860B;border-bottom:none;border-radius:2px 2px 0 0"></div>
        </div>
        <div style="position:absolute;top:6px;left:6px;width:18px;height:20px;background:#fff;border:1px solid #808080"></div>
      </div>
      <div class="icon-label" style="text-shadow:-1px 0 #000,0 1px #000,1px 0 #000,0 -1px #000">My Documents</div>
    </div>

    <div id="icon-network" class="icon">
      <div class="icon-img" style="position:relative;width:32px;height:32px">
        <div style="position:absolute;top:2px;left:0;width:18px;height:14px;background:#C0C0C0;border:2px solid #000;border-radius:1px">
          <div style="margin:2px;width:12px;height:8px;background:#000080"></div>
        </div>
        <div style="position:absolute;top:8px;left:14px;width:18px;height:14px;background:#C0C0C0;border:2px solid #000;border-radius:1px">
          <div style="margin:2px;width:12px;height:8px;background:#008080"></div>
        </div>
        <div style="position:absolute;top:14px;left:10px;width:12px;height:2px;background:#000"></div>
        <div style="position:absolute;bottom:2px;left:3px;width:8px;height:3px;background:#808080;border:1px solid #000"></div>
        <div style="position:absolute;bottom:2px;left:21px;width:8px;height:3px;background:#808080;border:1px solid #000"></div>
      </div>
      <div class="icon-label" style="text-shadow:-1px 0 #000,0 1px #000,1px 0 #000,0 -1px #000">Network Neighborhood</div>
    </div>

    <div id="icon-recycle" class="icon">
      <div class="icon-img" style="position:relative;width:32px;height:32px">
        <div style="position:absolute;top:4px;left:6px;width:20px;height:4px;background:#808080;border:2px solid #000;border-radius:1px"></div>
        <div style="position:absolute;top:8px;left:4px;width:24px;height:20px;border:2px solid #808080;border-top:2px solid #000;border-radius:0 0 3px 3px;background:transparent">
          <div style="position:absolute;top:3px;left:5px;width:2px;height:12px;background:#808080"></div>
          <div style="position:absolute;top:3px;left:10px;width:2px;height:12px;background:#808080"></div>
          <div style="position:absolute;top:3px;left:15px;width:2px;height:12px;background:#808080"></div>
        </div>
        <div style="position:absolute;top:2px;left:11px;width:10px;height:3px;background:#808080;border:1px solid #000;border-bottom:none;border-radius:2px 2px 0 0"></div>
      </div>
      <div class="icon-label" style="text-shadow:-1px 0 #000,0 1px #000,1px 0 #000,0 -1px #000">Recycle Bin</div>
    </div>

    <div id="icon-internet" class="icon">
      <div class="icon-img" style="position:relative;width:32px;height:32px">
        <div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(to bottom,#4488CC,#88BBEE);border:2px solid #336699;position:absolute;top:2px;left:2px;overflow:hidden">
          <div style="position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,0.5)"></div>
          <div style="position:absolute;top:25%;left:0;right:0;height:1px;background:rgba(255,255,255,0.3)"></div>
          <div style="position:absolute;top:75%;left:0;right:0;height:1px;background:rgba(255,255,255,0.3)"></div>
          <div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.5)"></div>
          <div style="position:absolute;left:50%;top:0;width:16px;height:100%;border-radius:50%;border:1px solid rgba(255,255,255,0.4)"></div>
          <div style="position:absolute;right:50%;top:0;width:16px;height:100%;border-radius:50%;border:1px solid rgba(255,255,255,0.4)"></div>
        </div>
      </div>
      <div class="icon-label" style="text-shadow:-1px 0 #000,0 1px #000,1px 0 #000,0 -1px #000">Internet</div>
    </div>

    <div id="icon-inbox" class="icon">
      <div class="icon-img" style="position:relative;width:32px;height:32px">
        <!-- Globe base (bottom half) -->
        <div style="position:absolute;bottom:0;left:8px;width:16px;height:16px;border-radius:50%;background:#003087;overflow:hidden">
          <div style="position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,0.6)"></div>
          <div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.6)"></div>
          <div style="position:absolute;top:25%;left:0;right:0;height:1px;background:rgba(255,255,255,0.3)"></div>
          <div style="position:absolute;top:75%;left:0;right:0;height:1px;background:rgba(255,255,255,0.3)"></div>
        </div>
        <!-- Mailbox on top -->
        <div style="position:absolute;top:0;left:9px;width:14px;height:12px;background:#C0C0C0;border:1px solid #808080">
          <div style="position:absolute;top:5px;left:1px;width:10px;height:2px;background:#333"></div>
        </div>
        <!-- Red flag -->
        <div style="position:absolute;top:0;right:5px;width:3px;height:8px;background:#CC0000"></div>
      </div>
      <div class="icon-label" style="text-shadow:-1px 0 #000,0 1px #000,1px 0 #000,0 -1px #000">Inbox</div>
    </div>
    </div>

  </div>
  <div class="taskbar">
    <button id="start-btn" class="start-btn">&#9776; Start</button>
    <div id="taskbar-windows"></div>
    <div id="taskbar-tray" style="display:flex;align-items:center;gap:4px">
      <span style="font-size:10px">&#128266;</span>
      <span style="font-size:10px">&#128424;</span>
      <span id="clock" class="taskbar-clock"></span>
    </div>
  </div>
  </div>

  <script src="windowManager.js"></script>
  <script src="crash.js"></script>
  <script src="apps.js"></script>
  <script src="burnin.js"></script>
  <script src="boot.js"></script>
  <script>
    Boot.start().then(function () { Apps.init(); });
  </script>
</body>
</html>
